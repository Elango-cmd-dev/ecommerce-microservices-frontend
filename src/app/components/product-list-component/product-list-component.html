<div class="page">
  <main class="content">
    <h2 class="section-title">Popular products</h2>

    <!-- Loading state -->
    <div *ngIf="loading" class="message">Loading products...</div>

    <!-- Content -->
    <ng-container *ngIf="!loading">
      <div *ngIf="error" class="message error">{{ error }}</div>

      <div *ngIf="!error">
        <div class="product-grid" *ngIf="products.length > 0; else noProducts">
          <div class="product-card" *ngFor="let product of products">
            <div class="product-image">
              <ng-container *ngIf="product.imageSrc; else placeholder">
                <img
                  [src]="product.imageSrc"
                  [alt]="product.productName"
                  style="max-width:100%; max-height:220px; object-fit:cover; display:block;"
                />
              </ng-container>

              <ng-template #placeholder>
                <div class="image-placeholder">
                  {{ product.productName ? product.productName[0] : '?' }}
                </div>
              </ng-template>
            </div>

            <div class="product-info">
              <h3 class="name">{{ product.productName }}</h3>
              <p class="price">₹{{ product.productPrice }}</p>
              <p class="description">{{ product.productDescription | slice:0:80 }}</p>
              <button class="primary-btn" [routerLink]="['/products', product.productId]">
                View details
              </button>
            </div>
          </div>
        </div>

        <ng-template #noProducts>
          <div class="message">No products available.</div>
        </ng-template>
      </div>
    </ng-container>
  </main>
</div>
